<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Guía Simple - Centros Cercanos</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script id="tailwind-config">
      tailwind.config = { theme: { extend: { colors: { "primary": "#9b4500", "tertiary": "#a43c12", "background": "#fbf9f4", "surface-container": "#f0eee9", "on-surface": "#1b1c19" } } } }
    </script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="min-h-screen flex flex-col text-on-surface">

    <header class="bg-white shadow-[0_4px_20px_-4px_rgba(155,69,0,0.15)] sticky top-0 z-50">
        <div class="flex justify-between items-center px-6 md:px-10 py-4 max-w-7xl mx-auto w-full">
            <div class="flex items-center gap-3">
                <a href="index.html" class="w-10 h-10 bg-primary rounded-xl flex items-center justify-center text-white"><span class="material-symbols-outlined font-bold">assignment</span></a>
                <span class="text-xl font-extrabold text-primary">Guía Simple</span>
            </div>
            <nav class="hidden lg:flex items-center gap-6">
                <a class="text-sm font-medium text-on-surface-variant hover:text-primary transition-colors" href="index.html">Explorar</a>
                <a class="text-sm font-medium text-on-surface-variant hover:text-primary transition-colors" href="dashboard.html">Mis Trámites</a>
                <a class="text-sm font-bold text-primary border-b-2 border-primary pb-1" href="mapa.html">Centros Cercanos</a>
                <a class="text-sm font-medium text-on-surface-variant hover:text-primary transition-colors" href="comentarios.html">Comunidad</a>
                <a class="text-sm font-medium text-on-surface-variant hover:text-primary transition-colors" href="ayuda.html">Ayuda</a>
            </nav>
            <a href="dashboard.html" class="bg-primary text-white px-4 py-2 rounded-xl text-xs font-bold hover-lift">Mi Panel</a>
        </div>
    </header>

    <main class="flex-grow max-w-7xl mx-auto px-6 w-full py-8 flex flex-col md:flex-row gap-6">
        <div class="w-full md:w-80 flex flex-col gap-4">
            <div>
                <h1 class="text-2xl font-extrabold">Puntos de atención</h1>
                <p class="text-xs text-gray-500">Selecciona un lugar para ubicarlo en el panel.</p>
            </div>
            <div class="space-y-3 overflow-y-auto max-h-[500px]" id="locations-list">
                <div class="widget-card p-4 cursor-pointer border-l-4 border-primary bg-white" data-name="Oficina Central de Tránsito">
                    <h4 class="font-bold text-sm">Oficina Central de Tránsito</h4>
                    <p class="text-xs text-gray-400">Av. Américas #45-12</p>
                </div>
                <div class="widget-card p-4 cursor-pointer border-l-4 border-tertiary bg-white" data-name="Centro Médico Sanitas CRC">
                    <h4 class="font-bold text-sm">Centro CRC Médico Autorizado</h4>
                    <p class="text-xs text-gray-400">Calle 26 #68-90</p>
                </div>
            </div>
        </div>

        <div class="flex-grow bg-white rounded-[32px] p-4 shadow-sm border min-h-[400px] flex flex-col justify-between">
            <div class="w-full h-full rounded-2xl map-placeholder relative flex items-center justify-center overflow-hidden border">
                <div id="map-pin" class="absolute bg-primary text-white px-3 py-1.5 rounded-xl text-xs font-bold shadow-lg flex items-center gap-1 transition-all">
                    <span class="material-symbols-outlined text-sm">push_pin</span>
                    <span id="pin-text">Sede Principal Tránsito</span>
                </div>
            </div>
        </div>
    </main>

    <script src="mapa.js"></script>
</body>
</html>
